<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tugas AR Presentasi</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      /* Tambahin UI loading simple biar layar gak nge-blank pas awal */
      #example-scanning-overlay {
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        background: transparent;
        z-index: 0;
      }
      @media (min-aspect-ratio: 1/1) {
        #example-scanning-overlay .inner {
          width: 50vh;
          height: 50vh;
        }
      }
      @media (max-aspect-ratio: 1/1) {
        #example-scanning-overlay .inner {
          width: 80vw;
          height: 80vw;
        }
      }
      #example-scanning-overlay .inner {
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid custom;
      }
      #example-scanning-overlay img {
        opacity: 0.7;
        width: 100%;
        align-self: center;
      }
    </style>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="myModel" src="./model-mcdonald.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
  
        <a-entity rotation="0 180 0">
    
          <a-gltf-model position="0 0 0" scale="0.1 0.1 0.1" src="#myModel" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear;"></a-gltf-model>
    
        </a-entity>

      </a-entity>

    </a-scene>
  </body>
</html>
